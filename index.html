<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>红帆领航纾民困 基层善治启新程</title>
  <style>
    :root {
      --red: #c4161c;
      --deep-red: #8f0008;
      --gold: #ffd35a;
      --gold-dark: #b97800;
      --ink: #2d2626;
      --muted: #7a6a66;
      --paper: #fff8ee;
      --line: rgba(196, 22, 28, .22);
      --shadow: 0 24px 80px rgba(70, 0, 0, .22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 6%, rgba(255, 213, 90, .22), transparent 22rem),
        radial-gradient(circle at 88% 12%, rgba(255, 255, 255, .22), transparent 26rem),
        linear-gradient(145deg, #970008 0%, #c4161c 46%, #6f0007 100%);
      overflow: hidden;
    }

    .flag-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, transparent 0 32%, rgba(255,255,255,.11) 43%, transparent 55%),
        repeating-linear-gradient(150deg, rgba(255,255,255,.05) 0 2px, transparent 2px 120px);
      mix-blend-mode: screen;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      padding: 28px;
      display: grid;
      grid-template-columns: 270px minmax(0, 1fr);
      gap: 22px;
    }

    .stage > aside {
      position: relative;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 1px solid rgba(255, 211, 90, .34);
      background: linear-gradient(180deg, rgba(120,0,6,.82), rgba(80,0,5,.78));
      border-radius: 8px;
      box-shadow: var(--shadow);
      color: #fff6df;
      overflow: hidden;
    }

    .stage > aside::before {
      content: "";
      position: absolute;
      inset: -60px -40px auto auto;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(255, 211, 90, .14);
    }

    .brand {
      position: relative;
      flex: none;
      padding: 24px 20px 18px;
      border-bottom: 1px solid rgba(255, 211, 90, .24);
    }

    .emblem {
      width: 72px;
      height: 72px;
      margin-bottom: 16px;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,.28));
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
      color: var(--gold);
    }

    .brand p {
      margin: 10px 0 0;
      font-size: 13px;
      line-height: 1.55;
      color: rgba(255, 246, 223, .82);
    }

    .nav {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 14px 12px 56px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,211,90,.35) transparent;
    }

    .nav button {
      position: relative;
      width: 100%;
      border: 0;
      border-left: 3px solid transparent;
      background: transparent;
      color: rgba(255, 246, 223, .78);
      text-align: left;
      padding: 9px 9px 9px 12px;
      margin: 1px 0;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.3;
      overflow: hidden;
      transition:
        opacity .18s ease,
        filter .18s ease,
        transform .18s ease,
        color .18s ease,
        background .18s ease,
        box-shadow .18s ease,
        border-color .18s ease;
    }

    .nav button::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background:
        linear-gradient(90deg, rgba(255,211,90,.28), rgba(255,255,255,.08), transparent 62%);
      transition: opacity .18s ease;
    }

    .nav:hover button {
      opacity: .34;
      filter: saturate(.65) brightness(.72);
    }

    .nav button:hover,
    .nav button.active {
      color: #fff;
      background: rgba(255, 211, 90, .12);
      border-left-color: var(--gold);
    }

    .nav:hover button:hover {
      opacity: 1;
      filter: saturate(1.2) brightness(1.12);
      transform: translateX(8px);
      background: linear-gradient(90deg, rgba(255,211,90,.26), rgba(255,255,255,.12));
      box-shadow:
        0 10px 24px rgba(0,0,0,.22),
        inset 0 0 0 1px rgba(255,211,90,.28);
      border-left-color: var(--gold);
    }

    .nav:hover button:hover::after {
      opacity: 1;
    }

    main {
      min-width: 0;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background: var(--paper);
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      padding: 56px 74px 96px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 22px;
      opacity: 0;
      transform: translateX(32px) scale(.985);
      transition: opacity .34s ease, transform .34s ease;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.72), rgba(255,248,238,.96)),
        radial-gradient(circle at 92% 16%, rgba(196,22,28,.08), transparent 20rem);
    }

    .slide.active {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }

    .slide::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 12px;
      background: linear-gradient(90deg, var(--deep-red), var(--red), var(--gold));
    }

    .ribbon {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      color: var(--red);
      font-weight: 800;
      font-size: 15px;
    }

    .ribbon::before {
      content: "";
      width: 54px;
      height: 17px;
      background: var(--red);
      clip-path: polygon(0 0, 88% 0, 100% 50%, 88% 100%, 0 100%);
      box-shadow: 0 4px 0 rgba(143,0,8,.14);
    }

    .slide h2 {
      margin: 0;
      max-width: 1040px;
      font-size: 38px;
      line-height: 1.18;
      color: var(--red);
      letter-spacing: 0;
    }

    .cover h2 {
      font-size: 54px;
      max-width: 880px;
      margin-top: 110px;
      color: var(--gold);
      text-shadow: 0 3px 14px rgba(70,0,0,.5);
    }

    .cover {
      color: #fff6df;
      background:
        linear-gradient(145deg, rgba(126,0,7,.7), rgba(196,22,28,.94)),
        radial-gradient(circle at 22% 20%, rgba(255,211,90,.2), transparent 16rem);
    }

    .cover .subtitle {
      font-size: 24px;
      line-height: 1.45;
      color: rgba(255,246,223,.9);
      max-width: 820px;
      margin-top: 18px;
    }

    .content {
      align-self: stretch;
      display: grid;
      align-content: center;
      gap: 24px;
      min-height: 0;
    }

    .slide:not(.cover) .content {
      padding-bottom: 18px;
    }

    .bullets {
      display: grid;
      gap: 13px;
      margin: 0;
      padding: 0;
      list-style: none;
      max-width: 930px;
    }

    .bullets li {
      position: relative;
      z-index: 1;
      padding: 15px 20px 15px 54px;
      background: rgba(255, 255, 255, .72);
      border: 1px solid var(--line);
      border-radius: 6px;
      font-size: 23px;
      line-height: 1.34;
      box-shadow: 0 10px 28px rgba(143,0,8,.08);
      cursor: pointer;
      transform-origin: left center;
      transition:
        transform .2s ease,
        background .2s ease,
        border-color .2s ease,
        box-shadow .2s ease,
        opacity .28s ease .18s,
        filter .28s ease .18s;
    }

    .bullets li::before {
      content: "";
      position: absolute;
      left: 22px;
      top: 24px;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 0 5px rgba(196,22,28,.12);
    }

    .bullets li:hover,
    .bullets li.revealed {
      z-index: 6;
      transform: translateX(10px) scale(1.045);
      background: #fff;
      border-color: rgba(196,22,28,.42);
      box-shadow: 0 18px 44px rgba(143,0,8,.18);
    }

    .bullets li:last-child {
      transform-origin: left bottom;
    }

    .four-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 20px;
    }

    .pillar {
      position: relative;
      z-index: 1;
      min-height: 210px;
      border-radius: 8px;
      background: linear-gradient(180deg, var(--red), var(--deep-red));
      color: #fff;
      display: grid;
      place-items: center;
      padding: 18px;
      text-align: center;
      font-size: 31px;
      font-weight: 800;
      border: 1px solid rgba(255,211,90,.36);
      box-shadow: 0 18px 40px rgba(143,0,8,.2);
      cursor: pointer;
      transform-origin: center;
      transition:
        transform .24s ease,
        box-shadow .24s ease,
        filter .28s ease .18s,
        opacity .28s ease .18s;
    }

    .pillar:hover,
    .pillar.revealed {
      z-index: 6;
      transform: translateY(-12px) scale(1.045);
      filter: brightness(1.08);
      box-shadow: 0 26px 54px rgba(143,0,8,.32);
    }

    .tail {
      margin: 6px 0 0;
      color: var(--deep-red);
      font-size: 28px;
      font-weight: 800;
      text-align: center;
    }

    .timeline {
      display: grid;
      gap: 24px;
      max-width: 1030px;
    }

    .step {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 18px;
      align-items: center;
      cursor: pointer;
      transform-origin: left center;
      transition:
        transform .22s ease,
        filter .28s ease .18s,
        opacity .28s ease .18s;
    }

    .step:last-child {
      transform-origin: left bottom;
    }

    .num {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--red);
      font-size: 20px;
      font-weight: 900;
      box-shadow: 0 0 0 8px rgba(196,22,28,.12);
    }

    .bar {
      min-height: 64px;
      padding: 16px 20px;
      color: var(--ink);
      background: linear-gradient(90deg, rgba(196,22,28,.12), rgba(255,255,255,.82));
      border-top: 5px solid var(--red);
      font-size: 23px;
      line-height: 1.35;
      transition: background .22s ease, box-shadow .22s ease, font-size .22s ease;
    }

    .step:hover,
    .step.revealed {
      z-index: 6;
      transform: translateX(8px) scale(1.035);
      filter: brightness(1.02);
    }

    .step:hover .bar,
    .step.revealed .bar {
      background: #fff;
      font-size: 23.5px;
      box-shadow: 0 16px 38px rgba(143,0,8,.16);
    }

    .summary-box {
      position: relative;
      z-index: 1;
      max-width: 980px;
      border-left: 10px solid var(--gold);
      background: rgba(255,255,255,.74);
      padding: 32px 36px;
      font-size: 30px;
      line-height: 1.55;
      box-shadow: 0 18px 50px rgba(143,0,8,.14);
      transform-origin: left center;
      transition:
        transform .22s ease,
        background .22s ease,
        box-shadow .22s ease,
        opacity .28s ease .18s,
        filter .28s ease .18s;
    }

    .summary-box:hover,
    .summary-box.revealed {
      z-index: 6;
      transform: scale(1.03);
      background: #fff;
      box-shadow: 0 24px 64px rgba(143,0,8,.2);
    }

    .bullets li.dimmed,
    .step.dimmed,
    .pillar.dimmed,
    .summary-box.dimmed,
    .clickable.dimmed {
      opacity: .18 !important;
      filter: grayscale(.45) saturate(.38) brightness(.68) !important;
    }

    .spotlight {
      opacity: 1 !important;
      filter: none !important;
      z-index: 8;
      transition-delay: 0s;
    }

    .bullets li.spotlight,
    .step.spotlight .bar,
    .pillar.spotlight,
    .summary-box.spotlight {
      box-shadow: 0 24px 60px rgba(143,0,8,.28);
    }

    .media-layout {
      grid-template-columns: minmax(0, 1fr) minmax(300px, 430px);
      align-items: center;
      gap: 30px;
    }

    .media-panel {
      align-self: center;
      border: 1px solid rgba(196, 22, 28, .25);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,248,238,.92));
      box-shadow: 0 18px 42px rgba(143,0,8,.12);
      padding: 18px;
      cursor: pointer;
      min-height: 108px;
    }

    .media-toggle {
      position: relative;
      display: grid;
      place-items: center;
      width: 64px;
      height: 64px;
      margin: 0 auto;
      border: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,.55), transparent 18%),
        radial-gradient(circle at 68% 72%, rgba(83,0,6,.45), transparent 42%),
        linear-gradient(145deg, #d3292e 0%, #a6000b 48%, #6f0007 100%);
      color: #fff;
      font-size: 0;
      font-weight: 800;
      padding: 0;
      cursor: pointer;
      letter-spacing: 0;
      box-shadow:
        0 12px 0 #650006,
        0 22px 30px rgba(90,0,6,.3),
        inset 0 3px 8px rgba(255,255,255,.34),
        inset 0 -8px 14px rgba(65,0,4,.42);
      transition: transform .14s ease, box-shadow .14s ease, filter .14s ease;
    }

    .media-toggle:hover {
      filter: brightness(1.08);
      transform: translateY(-2px);
    }

    .media-toggle:active,
    .media-panel.pressing .media-toggle {
      transform: translateY(8px) scale(.98);
      box-shadow:
        0 4px 0 #650006,
        0 10px 16px rgba(90,0,6,.25),
        inset 0 2px 5px rgba(255,255,255,.26),
        inset 0 -5px 10px rgba(65,0,4,.52);
    }

    .media-gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(10px);
      transition: max-height .34s ease, opacity .28s ease, transform .28s ease, margin-top .28s ease;
    }

    .media-panel.revealed .media-gallery {
      max-height: 520px;
      opacity: 1;
      transform: translateY(0);
      margin-top: 14px;
    }

    .media-panel.revealed .media-toggle {
      background:
        radial-gradient(circle at 32% 28%, rgba(255,255,255,.48), transparent 18%),
        radial-gradient(circle at 68% 72%, rgba(83,0,6,.5), transparent 42%),
        linear-gradient(145deg, #b6000c 0%, #830008 52%, #520004 100%);
    }

    .media-gallery.two {
      grid-template-columns: 1fr 1fr;
    }

    .media-gallery img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
      border-radius: 6px;
      border: 1px solid rgba(143,0,8,.18);
      background: #fff;
    }

    .media-gallery.two img {
      height: 210px;
    }

    .footer {
      position: absolute;
      left: 74px;
      right: 74px;
      bottom: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(95, 45, 35, .68);
      font-size: 13px;
    }

    .progress {
      position: fixed;
      left: 0;
      bottom: 0;
      height: 5px;
      width: 100%;
      background: rgba(255,255,255,.14);
      z-index: 20;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 5%;
      background: linear-gradient(90deg, var(--gold), #fff0a6);
      transition: width .28s ease;
    }

    .controls {
      position: fixed;
      right: 34px;
      bottom: 28px;
      display: flex;
      gap: 10px;
      z-index: 30;
    }

    .controls button {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,211,90,.35);
      color: #fff;
      background: rgba(90,0,6,.72);
      cursor: pointer;
      font-size: 22px;
    }

    .controls button:hover {
      background: var(--deep-red);
    }

    .mobile-status {
      display: none;
    }

    @media (min-width: 981px) and (max-height: 720px) {
      .stage {
        padding: 18px;
        gap: 18px;
        grid-template-columns: 250px minmax(0, 1fr);
      }

      .brand {
        padding: 18px 18px 14px;
      }

      .emblem {
        width: 54px;
        height: 54px;
        margin-bottom: 12px;
      }

      .brand h1 {
        font-size: 17px;
      }

      .brand p {
        font-size: 12px;
        line-height: 1.42;
      }

      .nav {
        padding: 10px 10px 44px;
      }

      .nav button {
        padding: 7px 8px 7px 10px;
        font-size: 12px;
        line-height: 1.24;
      }

      .slide {
        padding: 34px 58px 80px;
        gap: 12px;
      }

      .ribbon {
        font-size: 13px;
      }

      .ribbon::before {
        width: 44px;
        height: 14px;
      }

      .slide h2 {
        font-size: 30px;
        line-height: 1.12;
      }

      .cover h2 {
        font-size: 42px;
        margin-top: 74px;
      }

      .cover .subtitle {
        font-size: 20px;
      }

      .content {
        gap: 14px;
      }

      .slide:not(.cover) .content {
        padding-bottom: 6px;
      }

      .bullets {
        gap: 8px;
        max-width: 890px;
      }

      .bullets li {
        padding: 10px 16px 10px 46px;
        font-size: 19px;
        line-height: 1.26;
      }

      .bullets li::before {
        left: 18px;
        top: 17px;
        width: 11px;
        height: 11px;
        box-shadow: 0 0 0 4px rgba(196,22,28,.12);
      }

      .bullets li:hover,
      .bullets li.revealed {
        transform: translateX(8px) scale(1.035);
      }

      .four-grid {
        gap: 14px;
      }

      .pillar {
        min-height: 150px;
        padding: 14px;
        font-size: 25px;
      }

      .pillar:hover,
      .pillar.revealed {
        transform: translateY(-8px) scale(1.035);
      }

      .timeline {
        gap: 20px;
      }

      .step {
        grid-template-columns: 56px 1fr;
        gap: 12px;
      }

      .num {
        width: 46px;
        height: 46px;
        font-size: 17px;
        box-shadow: 0 0 0 6px rgba(196,22,28,.12);
      }

      .bar {
        min-height: 50px;
        padding: 10px 16px;
        font-size: 19px;
        line-height: 1.26;
        border-top-width: 4px;
      }

      .step:hover,
      .step.revealed {
        transform: translateX(6px) scale(1.025);
      }

      .step:hover .bar,
      .step.revealed .bar {
        font-size: 19.5px;
      }

      .summary-box {
        padding: 24px 28px;
        font-size: 25px;
        line-height: 1.42;
      }

      .media-layout {
        grid-template-columns: minmax(0, 1fr) minmax(260px, 360px);
        gap: 22px;
      }

      .media-panel {
        padding: 14px;
        min-height: 86px;
      }

      .media-toggle {
        width: 54px;
        height: 54px;
        box-shadow:
          0 9px 0 #650006,
          0 16px 24px rgba(90,0,6,.28),
          inset 0 3px 8px rgba(255,255,255,.34),
          inset 0 -7px 12px rgba(65,0,4,.42);
      }

      .media-gallery img {
        height: 176px;
      }

      .media-gallery.two img {
        height: 146px;
      }

      .footer {
        left: 58px;
        right: 58px;
        bottom: 22px;
      }
    }

    @media (max-width: 980px) {
      body {
        min-height: 100dvh;
        overflow: hidden;
        background:
          radial-gradient(circle at 12% 4%, rgba(255, 213, 90, .24), transparent 14rem),
          linear-gradient(160deg, #970008 0%, #c4161c 58%, #6f0007 100%);
      }

      .stage {
        width: 100vw;
        height: 100dvh;
        grid-template-columns: 1fr;
        padding: 62px 10px 76px;
        gap: 0;
      }

      .stage > aside {
        display: none;
      }

      main {
        height: 100%;
        min-height: 0;
        border-radius: 8px;
      }

      .mobile-status {
        position: fixed;
        top: 10px;
        left: 10px;
        right: 10px;
        z-index: 35;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        min-height: 44px;
        padding: 8px 12px;
        border: 1px solid rgba(255,211,90,.34);
        border-radius: 8px;
        color: #fff8df;
        background: rgba(105,0,7,.82);
        box-shadow: 0 12px 30px rgba(70,0,0,.28);
        backdrop-filter: blur(10px);
      }

      .mobile-status span {
        display: grid;
        place-items: center;
        min-width: 48px;
        height: 28px;
        border-radius: 999px;
        color: var(--deep-red);
        background: var(--gold);
        font-size: 13px;
        font-weight: 900;
      }

      .mobile-status strong {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 14px;
        line-height: 1.2;
      }

      .slide {
        padding: 24px 18px 104px;
        gap: 16px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        grid-template-rows: auto minmax(0, 1fr);
      }

      .slide::after {
        display: none;
      }

      .ribbon {
        font-size: 13px;
        gap: 8px;
      }

      .ribbon::before {
        width: 36px;
        height: 12px;
      }

      .slide h2 {
        font-size: 25px;
        line-height: 1.18;
        max-width: none;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .slide header,
      .content,
      .bullets,
      .bullets li,
      .timeline,
      .step,
      .bar,
      .pillar,
      .tail,
      .summary-box,
      .media-panel {
        min-width: 0;
        max-width: 100%;
      }

      .cover {
        align-content: center;
      }

      .cover h2 {
        margin-top: 44px;
        font-size: 34px;
        line-height: 1.12;
        max-width: 100%;
      }

      .cover .subtitle {
        font-size: 19px;
        line-height: 1.42;
        max-width: 100%;
        overflow-wrap: anywhere;
      }

      .content {
        align-content: start;
        gap: 18px;
        padding-bottom: 26px;
      }

      .cover .content {
        align-content: center;
      }

      .bullets {
        gap: 12px;
        max-width: none;
      }

      .bullets li {
        padding: 14px 14px 14px 44px;
        font-size: 18px;
        line-height: 1.34;
        border-radius: 7px;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .bullets li::before {
        left: 17px;
        top: 21px;
        width: 10px;
        height: 10px;
        box-shadow: 0 0 0 4px rgba(196,22,28,.12);
      }

      .bullets li:hover,
      .bullets li.revealed {
        transform: translateX(4px) scale(1.018);
      }

      .media-layout {
        display: flex;
        flex-direction: column;
        grid-template-columns: 1fr;
        align-content: start;
        gap: 18px;
      }

      .media-layout > .bullets,
      .media-layout > .timeline,
      .media-layout > .media-panel {
        flex: 0 0 auto;
      }

      .media-panel {
        width: 100%;
        min-height: 82px;
        padding: 14px;
        scroll-margin-bottom: 96px;
      }

      .media-toggle {
        width: 56px;
        height: 56px;
        box-shadow:
          0 8px 0 #650006,
          0 15px 22px rgba(90,0,6,.28),
          inset 0 3px 8px rgba(255,255,255,.34),
          inset 0 -7px 12px rgba(65,0,4,.42);
      }

      .media-panel.revealed .media-gallery {
        display: grid;
        max-height: none;
        margin-top: 0;
        margin-bottom: 24px;
        opacity: 1;
        overflow: visible;
        transform: none;
        order: 1;
      }

      .media-panel.revealed {
        display: flex;
        flex-direction: column;
      }

      .media-panel:not(.revealed) .media-gallery {
        display: none;
      }

      .media-panel.revealed .media-toggle {
        width: 44px;
        height: 44px;
        order: 2;
        margin: 0 auto 2px;
        box-shadow:
          0 6px 0 #650006,
          0 12px 18px rgba(90,0,6,.25),
          inset 0 3px 7px rgba(255,255,255,.3),
          inset 0 -6px 10px rgba(65,0,4,.42);
      }

      .media-gallery,
      .media-gallery.two {
        grid-template-columns: 1fr;
      }

      .media-gallery img,
      .media-gallery.two img {
        height: 188px;
        object-fit: contain;
      }

      .four-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .pillar {
        min-height: 118px;
        padding: 14px 10px;
        font-size: 22px;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .pillar:hover,
      .pillar.revealed {
        transform: translateY(-5px) scale(1.025);
      }

      .tail {
        font-size: 21px;
        line-height: 1.35;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .timeline {
        gap: 14px;
        max-width: none;
      }

      .step {
        grid-template-columns: 46px 1fr;
        gap: 10px;
      }

      .num {
        width: 40px;
        height: 40px;
        font-size: 16px;
        box-shadow: 0 0 0 5px rgba(196,22,28,.12);
      }

      .bar {
        min-height: 48px;
        padding: 11px 13px;
        font-size: 17px;
        line-height: 1.34;
        border-top-width: 4px;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .step:hover,
      .step.revealed {
        transform: translateX(4px) scale(1.018);
      }

      .step:hover .bar,
      .step.revealed .bar {
        font-size: 17.5px;
      }

      .summary-box {
        padding: 22px 20px;
        font-size: 22px;
        line-height: 1.5;
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .summary-box:hover,
      .summary-box.revealed {
        transform: scale(1.018);
      }

      .footer {
        display: none;
      }

      .controls {
        left: 10px;
        right: 10px;
        bottom: 16px;
        justify-content: space-between;
        pointer-events: none;
      }

      .controls button {
        width: 54px;
        height: 54px;
        border-width: 1px;
        font-size: 28px;
        background: rgba(93,0,7,.86);
        box-shadow: 0 12px 28px rgba(70,0,0,.28);
        pointer-events: auto;
      }

      .progress {
        height: 4px;
      }
    }

    @media (max-width: 420px) {
      .stage {
        padding-left: 8px;
        padding-right: 8px;
      }

      .slide {
        padding: 22px 14px 104px;
      }

      .slide h2 {
        font-size: 23px;
      }

      .cover h2 {
        font-size: 28px;
      }

      .cover .subtitle {
        font-size: 17px;
      }

      .bullets li {
        font-size: 17px;
      }

      .bar {
        font-size: 16px;
      }

      .step:hover .bar,
      .step.revealed .bar {
        font-size: 16.5px;
      }

      .media-gallery img,
      .media-gallery.two img {
        height: 176px;
      }
    }
  </style>
</head>
<body>
  <div class="flag-glow"></div>
  <div class="mobile-status" aria-live="polite">
    <span id="mobilePage">01/20</span>
    <strong id="mobileTitle">红帆领航纾民困 基层善治启新程</strong>
  </div>
  <div class="stage">
    <aside>
      <div class="brand">
        <svg class="emblem" viewBox="0 0 100 100" aria-hidden="true">
          <polygon fill="#ffd35a" stroke="#b97800" stroke-width="2" points="50,5 61,36 94,36 67,56 78,90 50,70 22,90 33,56 6,36 39,36" />
        </svg>
        <h1>红帆领航纾民困<br />基层善治启新程</h1>
        <p>湾仔街道桂园社区以物管会撬动老旧小区“焕新生”</p>
      </div>
      <nav class="nav" id="nav"></nav>
    </aside>

    <main id="deck" aria-live="polite"></main>
  </div>

  <div class="controls" aria-label="翻页控制">
    <button type="button" id="prev" aria-label="上一页">‹</button>
    <button type="button" id="next" aria-label="下一页">›</button>
  </div>
  <div class="progress"><span id="progress"></span></div>

  <script>
    const slides = [
      { type: "cover", title: "红帆领航纾民困 基层善治启新程", subtitle: "湾仔街道桂园社区以物管会撬动老旧小区“焕新生”" },
      { title: "总体思路", bullets: ["以“珠海邻里”和“两社三中心”为抓手", "坚持党建引领、改革创新双轮驱动", "以组建小区物业管理委员会为突破口", "探索老旧小区从“失管无序”到“共建善治”的治理路径"] },
      { title: "工作背景：华富新村治理难题", bullets: ["建成时间早、居民结构复杂、诉求多元", "基础设施老化，停车、卫生、消防等问题突出", "业委会换届失败后出现治理“真空期”", "居民诉求反馈难，矛盾和安全隐患集中累积"], images: ["guiyuan_html_assets/p3_image1.png"] },
      { type: "four", title: "破题方向：回答四个核心问题", items: ["谁来管", "管什么", "怎么管", "钱从哪来"], tail: "以物管会建设激活小区自治内生动力。" },
      { title: "主要措施1-1：党建统筹 + 支部联动", bullets: ["社区党委牵头成立物管会筹备专项工作组", "联合业委会党支部开展专题协商", "党员下沉宣讲政策、凝聚居民共识"], images: ["guiyuan_html_assets/p5_image1.jpeg", "guiyuan_html_assets/p5_image2.jpeg"] },
      { type: "timeline", title: "主要措施1-2：双线征集民意，拓宽参与渠道", bullets: ["建立“干部问事、百姓说事、集中议事、及时办事”机制", "组建巡查、调解、协商志愿队伍", "联动爱心商家、社区队伍、热心居民参与治理", "以全域资源为物管会运行提供资源支撑"], images: ["guiyuan_html_assets/p6_image1.jpeg"] },
      { type: "timeline", title: "主要措施1-3：严选骨干队伍，搭建治理纽带", bullets: ["业主推荐 + 个人自荐” 双渠道征集候选人", "组开展集体评议、实地考察、公开公示", "来源多样选拔9名由成员组建物管会，"], images: ["guiyuan_html_assets/p7_image1.jpeg"] },
      { type: "timeline", title: "主要措施2-1：全员走访 + 三方联动", bullets: ["党员和物管会入户收集居民诉求", "对供水供电、消防、电梯等开展安全体检"], images: ["guiyuan_html_assets/p8_image1.jpeg"] },
      { type: "timeline", title: "主要措施2-2：建立清单 + 分级推进", bullets: ["建立居民心愿清单和年度服务提升计划", "建立“社区党委 + 物管会 + 物业”月度联席会议制度"], images: ["guiyuan_html_assets/p9_image1.jpeg", "guiyuan_html_assets/p9_image2.jpeg"] },
      { type: "four", title: "主要措施2-3：闭环治理机制", items: ["问题收集", "议事协商", "落地处置", "反馈回访"], tail: "推动从“各自为政”转向“协同共治”。" },
      { type: "timeline", title: "主要措施3多元资源+共建共治", bullets: ["志愿服务队伍参与环境整治、安全巡查、矛盾调解", "爱心商家公益项目参与帮扶服务", "常态化开展居民“微心愿”认领", "形成党建引领、支部带动、居民自治、社企协同格局"] },
      { title: "治理成效1：建立长效资金机制", bullets: ["2024年8月成立物管会", "设立物管会独立专有账户", "停车场45%收益划入专属账户", "公共收益用于设施维修、环境消杀、绿化养护等事务", "推动小区治理从依赖补贴转向自主造血"], images: ["guiyuan_html_assets/p12_image1.png"] },
      { title: "治理成效2：公开监管与旧改推进", bullets: ["实行“月公示、季审计、年报告”", "保障居民知情权、监督权"], images: ["guiyuan_html_assets/p13_image1.jpeg"] },
      { title: "治理成效3：物管会深度参与旧改推进", bullets: ["物管会参与老旧小区改造沟通协调", "推动围蔽管理、消防管道安装、停车道闸、监控、排水管、路灯等项目落地"], images: ["guiyuan_html_assets/p14_image1.jpeg", "guiyuan_html_assets/p14_image2.jpeg"] },
      { type: "timeline", title: "实践经验1：党建统揽，建强自治核心", bullets: ["强化社区党委统筹引领", "发挥业委会党支部和党员楼栋长作用", "构建层级清晰的红色组织体系", "用党建凝聚居民共识、破解治理真空"] },
      { type: "timeline", title: "实践经验2：资金自主，阳光监管", bullets: ["推广公共收益共管模式", "指导老旧小区依法开设独立账户", "明确公共收益来源、比例和用途", "通过公开监管实现资金透明运行"] },
      { type: "timeline", title: "实践经验3：三方联动，闭环协商", bullets: ["固化社区党委、物管会、物业联席机制", "用居民议事会、凉亭议事角等平台协商问题", "建立诉求收集、协商、执行、反馈全闭环", "培育志愿队伍、爱心商家等多元治理力量"] },
      { type: "timeline", title: "实践经验4：需求导向，精准施策", bullets: ["围绕居民急难愁盼开展治理", "对安全隐患和民生项目分类分级推进", "聚焦停车难、消防隐患、环境脏乱等共性问题", "以看得见的民生改善激发居民自治参与"] },
      { type: "closing", title: "结尾", body: "以物管会为支点，桂园社区推动老旧小区实现组织重建、服务重塑、资金造血和治理焕新，为基层善治提供可复制经验。" },
      { type: "thanks", title: "感谢聆听", subtitle: "珠海市香洲区湾仔街道桂园社区" }
    ];

    const deck = document.getElementById("deck");
    const nav = document.getElementById("nav");
    const progress = document.getElementById("progress");
    const mobilePage = document.getElementById("mobilePage");
    const mobileTitle = document.getElementById("mobileTitle");
    const pointSelector = ".bullets li, .step, .pillar, .summary-box";
    let current = 0;

    function mediaMarkup(slide) {
      if (!slide.images || !slide.images.length) return "";
      return `<aside class="media-panel clickable" aria-label="点击显示图片">
        <button class="media-toggle" type="button" aria-label="显示或收起图片"></button>
        <div class="media-gallery ${slide.images.length > 1 ? "two" : ""}">
          ${slide.images.map((src, i) => `<img src="${src}" alt="${slide.title}配图${i + 1}" />`).join("")}
        </div>
      </aside>`;
    }

    function slideMarkup(slide, index) {
      const label = String(index + 1).padStart(2, "0");
      if (slide.type === "cover") {
        return `<section class="slide cover" data-index="${index}">
          <div></div><div class="content">
            <h2>${slide.title}</h2>
            <div class="subtitle">${slide.subtitle}</div>
          </div>
          <div class="footer"><span>桂园社区基层治理案例</span><span>${label}</span></div>
        </section>`;
      }
      if (slide.type === "four") {
        return `<section class="slide" data-index="${index}">
          <header><div class="ribbon">第 ${label} 页</div><h2>${slide.title}</h2></header>
          <div class="content">
            <div class="four-grid">${slide.items.map(item => `<div class="pillar clickable">${item}</div>`).join("")}</div>
            <p class="tail">${slide.tail}</p>
          </div>
          <div class="footer"><span>党建引领 · 共建善治</span><span>${label}</span></div>
        </section>`;
      }
      if (slide.type === "timeline") {
        const timeline = `<div class="timeline">${slide.bullets.map((b, i) => `
            <div class="step clickable"><div class="num">${i + 1}</div><div class="bar">${b}</div></div>`).join("")}</div>`;
        return `<section class="slide" data-index="${index}">
          <header><div class="ribbon">第 ${label} 页</div><h2>${slide.title}</h2></header>
          <div class="content ${slide.images ? "media-layout" : ""}">${timeline}${mediaMarkup(slide)}</div>
          <div class="footer"><span>红色引擎 · 精准施策</span><span>${label}</span></div>
        </section>`;
      }
      if (slide.type === "closing") {
        return `<section class="slide" data-index="${index}">
          <header><div class="ribbon">第 ${label} 页</div><h2>${slide.title}</h2></header>
          <div class="content"><div class="summary-box clickable">${slide.body}</div></div>
          <div class="footer"><span>可复制经验</span><span>${label}</span></div>
        </section>`;
      }
      if (slide.type === "thanks") {
        return `<section class="slide cover" data-index="${index}">
          <div></div><div class="content">
            <h2>${slide.title}</h2>
            <div class="subtitle">${slide.subtitle}</div>
          </div>
          <div class="footer"><span>汇报完毕</span><span>${label}</span></div>
        </section>`;
      }
      return `<section class="slide" data-index="${index}">
        <header><div class="ribbon">第 ${label} 页</div><h2>${slide.title}</h2></header>
        <div class="content ${slide.images ? "media-layout" : ""}"><ul class="bullets">${slide.bullets.map(b => `<li class="clickable">${b}</li>`).join("")}</ul>${mediaMarkup(slide)}</div>
        <div class="footer"><span>湾仔街道桂园社区</span><span>${label}</span></div>
      </section>`;
    }

    deck.innerHTML = slides.map(slideMarkup).join("");
    nav.innerHTML = slides.map((s, i) => `<button type="button" data-go="${i}">${String(i + 1).padStart(2, "0")} ${s.title}</button>`).join("");

    function show(index) {
      current = Math.max(0, Math.min(slides.length - 1, index));
      document.querySelectorAll(".slide").forEach((el, i) => {
        el.classList.toggle("active", i === current);
        if (i !== current) clearPointFocus(el);
      });
      document.querySelectorAll(".nav button").forEach((el, i) => el.classList.toggle("active", i === current));
      progress.style.width = `${((current + 1) / slides.length) * 100}%`;
      mobilePage.textContent = `${String(current + 1).padStart(2, "0")}/${slides.length}`;
      mobileTitle.textContent = slides[current].title;
    }

    function clearPointFocus(slide) {
      slide.classList.remove("point-focus");
      slide.querySelectorAll(`${pointSelector}, .spotlight, .dimmed`).forEach(el => {
        el.classList.remove("spotlight", "dimmed", "revealed");
        el.style.opacity = "";
        el.style.filter = "";
      });
    }

    function focusPoint(target) {
      const slide = target.closest(".slide");
      const points = [...slide.querySelectorAll(pointSelector)];
      const alreadyActive = target.classList.contains("spotlight");
      clearPointFocus(slide);
      if (alreadyActive) return;
      target.classList.add("spotlight", "revealed");
      window.setTimeout(() => {
        if (!target.classList.contains("spotlight")) return;
        slide.classList.add("point-focus");
        points.forEach(point => {
          if (point !== target) {
            point.classList.add("dimmed");
            point.style.opacity = ".18";
            point.style.filter = "grayscale(.45) saturate(.38) brightness(.68)";
          }
        });
      }, 120);
    }

    nav.addEventListener("click", event => {
      const button = event.target.closest("button[data-go]");
      if (button) show(Number(button.dataset.go));
    });

    document.getElementById("prev").addEventListener("click", () => show(current - 1));
    document.getElementById("next").addEventListener("click", () => show(current + 1));

    document.addEventListener("keydown", event => {
      if (["ArrowRight", "PageDown", " "].includes(event.key)) show(current + 1);
      if (["ArrowLeft", "PageUp"].includes(event.key)) show(current - 1);
      if (event.key === "Home") show(0);
      if (event.key === "End") show(slides.length - 1);
    });

    deck.addEventListener("click", event => {
      const target = event.target.closest(".clickable");
      if (target) {
        if (target.classList.contains("media-panel")) {
          if (event.target.closest(".media-gallery") && !event.target.closest(".media-toggle")) return;
          target.classList.add("pressing");
          window.setTimeout(() => target.classList.remove("pressing"), 180);
          target.classList.toggle("revealed");
          if (target.classList.contains("revealed")) {
            window.setTimeout(() => {
              target.scrollIntoView({ block: "nearest", behavior: "smooth" });
            }, 80);
          }
          return;
        }
        if (target.matches(pointSelector)) focusPoint(target);
        return;
      }
      const activeSlide = event.target.closest(".slide.active");
      if (activeSlide) clearPointFocus(activeSlide);
    });

    show(0);
  </script>
</body>
</html>
